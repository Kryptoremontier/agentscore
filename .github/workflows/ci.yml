name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (app)
        run: npm run type-check

      - name: Type-check (tests)
        run: npx tsc -p tsconfig.test.json --noEmit

      # Non-blocking for now — tighten once the warning backlog is cleared.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npx vitest run
