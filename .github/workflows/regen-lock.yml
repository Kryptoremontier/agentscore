name: Regenerate Lockfile (Linux)

# Manually triggered only. Regenerates package-lock.json on the same Linux/
# Node environment that CI and Vercel build on, so the lock mirrors where the
# code actually runs (fixes cross-OS @emnapi/sharp-wasm32 drift from the
# Windows dev box). Commits ONLY the lockfile back to main.
on:
  workflow_dispatch:

# Never let two regen runs push concurrently and race on main.
concurrency:
  group: regen-lock
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  regen-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          # Persisted GITHUB_TOKEN (contents: write) so the job can push back.
          persist-credentials: true

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Regenerate lockfile (real Linux install)
        # Full install — resolves optional/platform-conditional deps
        # (sharp-wasm32, @emnapi) against the actual Linux environment, not a
        # dry recompute. This problem came from theory-vs-reality drift, so we
        # want the lock a real install produces.
        run: npm install

      - name: Commit lockfile if it changed
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json already in sync with Linux resolution — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Explicit single-path add — NEVER package.json or anything else.
          git add package-lock.json
          git commit -m "chore(deps): regenerate package-lock.json on Linux (Node 24)

Regenerated by a real npm install on the ubuntu-latest/Node 24 runner so the
lockfile mirrors the production build environment (Vercel + CI both build on
Linux). Fixes cross-OS drift in the sharp-wasm32 / @emnapi optional-dependency
subtree that was locked stale by npm install on the Windows dev box.

Auto-generated by .github/workflows/regen-lock.yml"
          git push origin HEAD:main
